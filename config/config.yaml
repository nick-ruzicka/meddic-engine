    thecarlylegroup: Carlyle Group
    silverlake: Silver Lake
    slpartners: Silver Lake
    aresmgmt: Ares Management
    vistaequity: Vista Equity Partners
    brookfield: Brookfield Asset Management
    brookfield_am: Brookfield Asset Management
    warburgpincus: Warburg Pincus
    generalatlantic: General Atlantic
    evercore: Evercore
    pjtpartners: PJT Partners
    houlihanlokey: Houlihan Lokey
    moelisandcompany: Moelis & Company
    williamblair: William Blair
    pipersandler: Piper Sandler
    jefferies: Jefferies
    oaktreecap: Oaktree Capital Management
    franciscoptnrs: Francisco Partners
    thomabravo: Thoma Bravo
    tpg: TPG
    baincapital: Bain Capital
    permira: Permira
    citadel: Citadel
    renaissance_rt: Renaissance Technologies LLC
    twosigma: Two Sigma Investments, LP
    aqrcapital: AQR Capital Management, LLC
    millenniummgmt: Millennium Management LLC
