# config.yaml
# MEDDIC Engine — client configuration
# All behavior driven from here. Change ICP, signals, weights without touching code.

client: 
version: "1.0"

# ── ICP Definition ────────────────────────────────────────────────────────────
icp:
  firm_types:
    - pe
    - hedge_fund
    - investment_bank
    - credit
  geographies:
    - US
    - UK
    - Europe
  exclude:
    - consumer_finance
    - retail_banking
    - insurance
    - early_stage_startup

# ── Scoring Weights ───────────────────────────────────────────────────────────
# Must sum to 1.0. Adjust after first campaign based on response rate data.
scoring_weights:
  icp_fit: 0.30
  ai_readiness: 0.25
  reachability: 0.25
  signal_freshness: 0.20

# ── Score Thresholds ──────────────────────────────────────────────────────────
thresholds:
  strong_match: 75
  good_match: 55
  moderate_match: 35

# ── Twitter Signal Collection ─────────────────────────────────────────────────
twitter:
  # Accounts to monitor continuously
  monitored_accounts:
    - BoringBiz_
    - FundamentEdge
    - BuysideAIreview
    - hgr_la
    - Restructuring__
    - dnlkwk
    - ZoeZouYi
    - aporia9n

  # Keywords for broad finance AI signal search
  keywords:
    pain:
      - "data room"
      - "due diligence hours"
      - "analyst bandwidth"
      - "reading VDR"
      - "CIM analysis"
      - "IC memo"
      - "manual diligence"
      - "drowning in documents"
      - "sifting through 10-K"
    evaluation:
      - "evaluating LLMs"
      - "piloting AI"
      - "testing "
      - "testing AlphaSense"
      - "testing Rogo"
      - "AI for due diligence"
      - "AI for deal workflow"
    transformation:
      - "AI transformation"
      - "AI-first"
      - "deploying AI across"
      - "firm-wide AI"
    competitor_frustration:
      - "AlphaSense expensive"
      - "AlphaSense pricing"
      - "Bloomberg slow"
      - "Bloomberg interface"
      - "Rogo limitation"

  # Known Twitter handles → firm name (used to resolve firm_id on tweets).
  # Handle is case-insensitive, no leading @.
